<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>

    <link rel="stylesheet" href="login.css" />
  </head>

  <body>
    <div class="login-box">
      <h2>Login</h2>

      <input type="text" id="username" placeholder="Username" />

      <input type="password" id="password" placeholder="Password" />

      <button onclick="login()">Đăng nhập</button>

      <p id="message"></p>
    </div>

    <script src="login.js"></script>
  </body>
</html>
